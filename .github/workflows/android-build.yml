##############################################################################
# Go With Sally - Mobile - Android APK Build
#
# Methode reprise du pipeline SallyCards (sally-* apps) et adaptee :
#   - Expo SDK 52 + React Native 0.76.3 + React 18.3.1
#   - App CLASSIQUE (App.tsx + React Navigation) -> PAS expo-router
#     => pas de fix metro monorepo, pas de expo-linking requis
#   - Repo standalone (pas un monorepo Nx) => metro par defaut
#
# Sortie : app-debug.apk publie sur la Release GitHub "latest"
#   https://github.com/salistar/go-with-sally/releases/download/latest/app-debug.apk
##############################################################################
name: Android Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # necessaire pour creer/mettre a jour la Release

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # PAS de cache:npm : pas toujours de package-lock fiable + legacy-peer-deps

      - name: Setup JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Aligner les deps sur Expo SDK 52 (expo install --fix)
        # Certains paquets etaient trop recents (SDK 53) : expo-clipboard ^8,
        # expo-image-manipulator ^14, expo-print ^15, expo-maps, expo-updates ^29.
        # -> 'expo-module-gradle-plugin not found' au prebuild/gradle.
        # expo install --fix epingle chaque expo-* a la version SDK 52.
        run: |
          npx expo install --fix
          npm install --legacy-peer-deps

      - name: Cleanup React 19 RC parasitaire (jest-expo)
        # jest-expo@52 embarque React 19 RC via react-server-dom-webpack.
        # Metro pourrait resoudre cette copie -> hooks casses. On la supprime.
        run: |
          rm -rf node_modules/jest-expo/node_modules/react \
                 node_modules/jest-expo/node_modules/react-dom \
                 node_modules/jest-expo/node_modules/react-server-dom-webpack \
                 node_modules/jest-expo/node_modules/react-test-renderer \
                 node_modules/jest-expo/node_modules/@types/react || true

      - name: Disable New Architecture (Bridgeless)
        # RN 0.76 Bridgeless instable avec certains modules natifs -> false pour debug.
        run: |
          node -e "const fs=require('fs');const a=JSON.parse(fs.readFileSync('app.json'));a.expo.newArchEnabled=false;fs.writeFileSync('app.json',JSON.stringify(a,null,2));console.log('newArchEnabled set to false');"

      - name: Expo prebuild (android)
        env:
          CI: "1"
        run: npx expo prebuild --platform android --clean

      - name: Bundle JS embarque (--reset-cache)
        # Sans bundle embarque, l'APK debug tente de joindre Metro localhost:8081.
        # Entry = package.json "main" (expo/AppEntry.js) -> pas de --entry-file.
        run: |
          rm -rf android/app/src/main/assets/index.android.bundle || true
          mkdir -p android/app/src/main/assets
          npx expo export:embed \
            --platform android \
            --dev false \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache

      - name: Gradle assembleDebug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Publish to GitHub Release "latest"
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest debug APK
          files: android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          body: |
            APK debug automatique (branch/tag: ${{ github.ref_name }}, sha: ${{ github.sha }}).
            Telechargement direct :
            https://github.com/salistar/go-with-sally/releases/download/latest/app-debug.apk
